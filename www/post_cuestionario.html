<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciberseguridad Personal — Evaluación Post</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--surface:#181c27;--surface2:#1f2535;
  --border:#2a3044;--border2:#363f58;
  --text:#e8eaf2;--text2:#8b93ad;--text3:#555f7a;
  --accent:#4f7cff;--accent2:#7b9fff;
  --green:#34c97a;--green2:#1a7a48;--gbg:#0d2e1d;
  --orange:#f59e0b;--obg:#2a1e00;
  --red:#f04757;--rbg:#2a0f12;
  --r:14px;--rs:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{scroll-behavior:auto}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.app{max-width:700px;margin:0 auto;padding:0 20px 80px}

.hdr{padding:36px 0 28px;border-bottom:1px solid var(--border);margin-bottom:32px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.hdr-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--accent2);background:rgba(79,124,255,.12);border:1px solid rgba(79,124,255,.25);border-radius:20px;padding:4px 12px;margin-bottom:12px}
.hdr h1{font-size:24px;font-weight:600;letter-spacing:-.02em;line-height:1.2;margin-bottom:6px}
.hdr h1 span{color:var(--accent2)}
.hdr p{font-size:13px;color:var(--text2);max-width:440px;line-height:1.65}
.lang-tog{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;flex-shrink:0}
.lbtn{padding:5px 13px;border-radius:7px;border:none;background:transparent;color:var(--text2);font-family:'Sora',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.lbtn.active{background:var(--accent);color:#fff}

.progress-wrap{margin-bottom:24px}
.prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:8px}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
.prog-label{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace}

.domain-divider{display:flex;align-items:center;gap:12px;margin:28px 0 20px}
.domain-divider-line{flex:1;height:1px;background:var(--border)}
.domain-divider-label{font-size:12px;font-weight:600;color:var(--accent2);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px}

.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:16px;overflow:hidden}
.q-head{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start}
.q-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--accent2);background:rgba(79,124,255,.1);border-radius:5px;padding:2px 7px;flex-shrink:0;margin-top:2px}
.q-title{font-size:14px;font-weight:500;line-height:1.5}
.q-ctx{padding:11px 20px;font-size:13px;color:var(--text2);line-height:1.6;border-bottom:1px solid var(--border);font-style:italic}
.opts-wrap{padding:13px 20px 16px;display:flex;flex-direction:column;gap:6px}
.opt{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;transition:all .18s;background:var(--surface2)}
.opt:hover{border-color:var(--border2);background:#242a3a}
.opt.selected{border-color:var(--accent);background:rgba(79,124,255,.08)}
.opt.locked{pointer-events:none}
.opt-letter{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text3);flex-shrink:0;margin-top:1px;font-family:'JetBrains Mono',monospace}
.opt.selected .opt-letter{background:var(--accent);border-color:var(--accent);color:#fff}
.opt-text{font-size:13px;line-height:1.45;color:var(--text2);flex:1}
.opt.selected .opt-text{color:var(--text)}

.submit-row{display:flex;justify-content:flex-end;margin-top:28px;gap:10px;align-items:center}
.submit-hint{font-size:13px;color:var(--text3)}
.btn{padding:10px 22px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:'Sora',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .18s}
.btn:hover{background:var(--surface2);color:var(--text)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:#6690ff;border-color:#6690ff;color:#fff}
.btn:disabled{opacity:.35;cursor:default}
.btn-sm{padding:7px 16px;font-size:12.5px;border-radius:8px}
.btn-ghost{border-color:transparent;color:var(--text3)}

/* RESULTS */
.result-header{text-align:center;padding:32px 0 24px}
.result-header .rh-icon{font-size:44px;margin-bottom:12px}
.result-header h2{font-size:22px;font-weight:600;letter-spacing:-.02em;margin-bottom:6px}
.result-header p{font-size:14px;color:var(--text2);max-width:380px;margin:0 auto}
.score-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:24px 0}
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:14px 16px;text-align:center}
.sc-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.sc-val{font-size:28px;font-weight:600;letter-spacing:-.02em}
.sc-val.good{color:var(--green)}.sc-val.ok{color:var(--orange)}.sc-val.bad{color:var(--red)}

.q-result{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:14px 16px;margin-bottom:10px}
.qr-head{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.qr-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.qr-title{font-size:13px;font-weight:500;line-height:1.4;flex:1}
.qr-body{font-size:12.5px;color:var(--text2);line-height:1.55;margin-top:4px;padding-left:25px}
.qr-chosen{font-size:12px;color:var(--text3);margin-top:4px;padding-left:25px}
.qr-chosen span{color:var(--text2)}

.save-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-top:20px}
.save-banner p{font-size:13px;color:var(--text2)}
.save-banner p strong{color:var(--text)}
.save-actions{display:flex;gap:8px;flex-wrap:wrap}
.results-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-top:14px}
.results-panel h3{font-size:14px;font-weight:600;margin-bottom:12px}
.re{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12.5px;gap:10px;flex-wrap:wrap}
.re:last-child{border:none}
.re-meta{color:var(--text2)}.re-score{font-family:'JetBrains Mono',monospace;font-weight:500}

@media(max-width:480px){
  .hdr{flex-direction:column}
  .score-cards{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div>
      <div class="hdr-tag">📋 <span id="hd-tag"></span></div>
      <h1 id="hd-title"></h1>
      <p id="hd-sub"></p>
    </div>
    <div class="lang-tog">
      <button class="lbtn active" onclick="setLang('es')">ES</button>
      <button class="lbtn" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div id="quiz-section">
    <div class="progress-wrap">
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="prog-label" id="prog-label"></div>
    </div>
    <div id="questions-wrap"></div>
    <div class="submit-row">
      <span class="submit-hint" id="submit-hint"></span>
      <button class="btn btn-primary" id="submit-btn" onclick="submitQuiz()" disabled></button>
    </div>
  </div>

  <div id="results-section" style="display:none">
    <div class="result-header">
      <div class="rh-icon" id="r-icon"></div>
      <h2 id="r-title"></h2>
      <p id="r-sub"></p>
    </div>
    <div class="score-cards" id="score-cards"></div>
    <div id="q-results"></div>
    <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap">
      <button class="btn" onclick="resetQuiz()" id="r-restart"></button>
    </div>
    <div id="save-wrap"></div>
    <div id="hist-wrap"></div>
  </div>

</div>

// Scoring: 4=correct 3=good 2=regular 1=bad (but we only care about correct answer index)
const SCORING = {4:4, 3:3, 2:2, 1:1};
const STORAGE_KEY = 'cyberpost_results';
const API_ENDPOINT = 'https://ciberseguridad-func.azurewebsites.net/api/saveresult';

async function sendToServer(payload) {
  try {
    const res = await fetch(API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    return res.ok;
  } catch (e) {
    return false;
  }
}

let lang = 'es';
let userAnswers = new Array(10).fill(null);

// ════════════════════════════════════════════════
// LANG
// ════════════════════════════════════════════════
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lbtn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  document.documentElement.lang = l;
  renderAll();
}

// ════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════
function renderAll() {
  const tx = TX[lang];
  document.getElementById('hd-tag').textContent = tx.tag;
  document.getElementById('hd-title').innerHTML = tx.title;
  document.getElementById('hd-sub').textContent = tx.sub;
  document.getElementById('submit-btn').textContent = tx.submitBtn;
  renderQuestions();
  updateProgress();
}

function renderQuestions() {
  const tx = TX[lang];
  const qs = QUESTIONS[lang];
  const wrap = document.getElementById('questions-wrap');
  wrap.innerHTML = '';
  const letters = ['A','B','C','D'];
  let lastDomain = -1;

  qs.forEach((q, qi) => {
    if (q.domain !== lastDomain) {
      lastDomain = q.domain;
      const div = document.createElement('div');
      div.className = 'domain-divider';
      div.innerHTML = `<div class="domain-divider-line"></div><div class="domain-divider-label">${tx.domainDividers[q.domain]}</div><div class="domain-divider-line"></div>`;
      wrap.appendChild(div);
    }

    const card = document.createElement('div');
    card.className = 'q-card';
    card.innerHTML = `<div class="q-head"><div class="q-num">P${qi+1}</div><div class="q-title">${q.title}</div></div>
      <div class="q-ctx">${q.ctx}</div>
      <div class="opts-wrap" id="qopts-${qi}"></div>`;
    wrap.appendChild(card);

    const optsWrap = document.getElementById('qopts-' + qi);
    q.opts.forEach((opt, oi) => {
      const div = document.createElement('div');
      div.className = 'opt' + (userAnswers[qi] === oi ? ' selected' : '');
      div.innerHTML = `<div class="opt-letter">${letters[oi]}</div><div class="opt-text">${opt.t}</div>`;
      div.onclick = () => selectAnswer(qi, oi);
      optsWrap.appendChild(div);
    });
  });
}

function selectAnswer(qi, oi) {
  userAnswers[qi] = oi;
  const wrap = document.getElementById('qopts-' + qi);
  wrap.querySelectorAll('.opt').forEach((o, i) => o.classList.toggle('selected', i === oi));
  updateProgress();
}

function updateProgress() {
  const tx = TX[lang];
  const answered = userAnswers.filter(a => a !== null).length;
  const total = 10;
  document.getElementById('prog-fill').style.width = Math.round(answered / total * 100) + '%';
  document.getElementById('prog-label').textContent = tx.progLabel.replace('{answered}', answered).replace('{total}', total);
  const allDone = answered === total;
  document.getElementById('submit-btn').disabled = !allDone;
  document.getElementById('submit-hint').textContent = allDone ? '' : tx.submitHint;
}

// ════════════════════════════════════════════════
// SUBMIT
// ════════════════════════════════════════════════
function submitQuiz() {
  const tx = TX[lang];
  const qs = QUESTIONS[lang];

  let correctByDomain = [0, 0];
  let totalByDomain = [0, 0];

  qs.forEach((q, qi) => {
    totalByDomain[q.domain]++;
    if (userAnswers[qi] === q.correct) correctByDomain[q.domain]++;
  });

  const totalCorrect = correctByDomain[0] + correctByDomain[1];
  const pct = Math.round(totalCorrect / 10 * 100);

  // Envío automático al servidor — silencioso, no bloquea la UI
  const autoPayload = {
    tool: 'post-cuestionario',
    lang: lang.toUpperCase(),
    timestamp: new Date().toISOString(),
    domain0: correctByDomain[0] + '/5',
    domain1: correctByDomain[1] + '/5',
    total: totalCorrect + '/10',
    pct: pct + '%',
    answers: QUESTIONS[lang].map((q, qi) => ({
      question: q.title,
      domain: q.domain,
      chosen: q.opts[userAnswers[qi]] ? q.opts[userAnswers[qi]].t : 'N/A',
      correct: userAnswers[qi] === q.correct,
    })),
  };
  sendToServer(autoPayload);

  document.getElementById('quiz-section').style.display = 'none';
  document.getElementById('results-section').style.display = 'block';
  window.scrollTo(0, 0);
  document.documentElement.scrollTop = 0;

  document.getElementById('r-icon').textContent = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '📚';
  document.getElementById('r-title').textContent = tx.rTitle;
  document.getElementById('r-sub').textContent = tx.rSub;
  document.getElementById('r-restart').textContent = tx.rRestart;

  // Score cards
  const sc = document.getElementById('score-cards');
  sc.innerHTML = '';
  [
    { label: tx.cardLabels[0], val: correctByDomain[0] + '/5', pct: correctByDomain[0]/5 },
    { label: tx.cardLabels[1], val: correctByDomain[1] + '/5', pct: correctByDomain[1]/5 },
    { label: tx.cardLabels[2], val: totalCorrect + '/10', pct: totalCorrect/10 },
  ].forEach(c => {
    const cls = c.pct >= .8 ? 'good' : c.pct >= .6 ? 'ok' : 'bad';
    sc.innerHTML += `<div class="score-card"><div class="sc-label">${c.label}</div><div class="sc-val ${cls}">${c.val}</div></div>`;
  });

  // Question results
  const qr = document.getElementById('q-results');
  qr.innerHTML = '';
  let lastDomain = -1;

  qs.forEach((q, qi) => {
    if (q.domain !== lastDomain) {
      lastDomain = q.domain;
      const div = document.createElement('div');
      div.className = 'domain-divider';
      div.style.margin = '20px 0 12px';
      div.innerHTML = `<div class="domain-divider-line"></div><div class="domain-divider-label">${tx.domainDividers[q.domain]}</div><div class="domain-divider-line"></div>`;
      qr.appendChild(div);
    }

    const correct = userAnswers[qi] === q.correct;
    const card = document.createElement('div');
    card.className = 'q-result';
    card.innerHTML = `<div class="qr-head">
        <div class="qr-icon">${correct ? '✅' : '⚠️'}</div>
        <div class="qr-title">P${qi+1}. ${q.title}</div>
      </div>
      <div class="qr-body">${q.explanation}</div>
      ${!correct ? `<div class="qr-chosen">${tx.yourAnswer} <span>${q.opts[userAnswers[qi]].t}</span></div>
      <div class="qr-chosen">${tx.bestAnswer} <span>${q.opts[q.correct].t}</span></div>` : ''}`;
    qr.appendChild(card);
  });

  renderSaveBanner(false, { correctByDomain, totalCorrect, pct });
  renderHistory();
}

// ════════════════════════════════════════════════
// SAVE
// ════════════════════════════════════════════════
let _lastResult = null;

function getSaved() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}

function saveResults() {
  if (!_lastResult) return;
  const tx = TX[lang];
  const entry = {
    date: new Date().toLocaleString(),
    lang: lang.toUpperCase(),
    domain0: _lastResult.correctByDomain[0] + '/5',
    domain1: _lastResult.correctByDomain[1] + '/5',
    total: _lastResult.totalCorrect + '/10',
    pct: _lastResult.pct + '%',
  };
  const saved = getSaved();
  saved.unshift(entry);
  if (saved.length > 30) saved.pop();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  renderSaveBanner(true, _lastResult);
  renderHistory();
}

function downloadJSON() {
  const saved = getSaved();
  if (!saved.length) return;
  const blob = new Blob([JSON.stringify(saved, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ciberseguridad_post_' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function clearHistory() {
  localStorage.removeItem(STORAGE_KEY);
  renderSaveBanner(false, _lastResult);
  renderHistory();
}

function renderSaveBanner(saved, result) {
  if (result) _lastResult = result;
  const tx = TX[lang];
  const existing = document.getElementById('save-banner');
  if (existing) existing.remove();
  const hasSaved = getSaved().length > 0;
  const banner = document.createElement('div');
  banner.id = 'save-banner';
  banner.className = 'save-banner';
  banner.innerHTML = `<p><strong>${saved ? tx.savedOk : tx.saveLabel}</strong> — ${tx.saveDesc}</p>
    <div class="save-actions">
      ${!saved ? `<button class="btn btn-sm btn-primary" onclick="saveResults()">${tx.saveLabel}</button>` : ''}
      ${hasSaved ? `<button class="btn btn-sm" onclick="downloadJSON()">${tx.downloadLabel}</button>` : ''}
      ${hasSaved ? `<button class="btn btn-sm btn-ghost" onclick="clearHistory()">${tx.clearLabel}</button>` : ''}
    </div>`;
  document.getElementById('save-wrap').appendChild(banner);
}

function renderHistory() {
  const tx = TX[lang];
  const wrap = document.getElementById('hist-wrap');
  wrap.innerHTML = '';
  const saved = getSaved();
  if (!saved.length) return;
  const panel = document.createElement('div');
  panel.className = 'results-panel';
  panel.innerHTML = `<h3>${tx.histTitle}</h3>`;
  saved.forEach(e => {
    const row = document.createElement('div');
    row.className = 're';
    row.innerHTML = `<span class="re-meta">${e.date} · ${e.lang}</span><span class="re-score">${e.pct} (${e.domain0} / ${e.domain1})</span>`;
    panel.appendChild(row);
  });
  wrap.appendChild(panel);
}

// ════════════════════════════════════════════════
// RESET
// ════════════════════════════════════════════════
function resetQuiz() {
  userAnswers = new Array(10).fill(null);
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('quiz-section').style.display = 'block';
  window.scrollTo(0, 0);
  document.documentElement.scrollTop = 0;
  renderAll();
}

// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
renderAll();
</script>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciberseguridad Personal — Aprendizaje Adaptativo</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--surface:#181c27;--surface2:#1f2535;
  --border:#2a3044;--border2:#363f58;
  --text:#e8eaf2;--text2:#8b93ad;--text3:#555f7a;
  --accent:#4f7cff;--accent2:#7b9fff;
  --green:#34c97a;--green2:#1a7a48;--gbg:#0d2e1d;
  --orange:#f59e0b;--obg:#2a1e00;
  --red:#f04757;--rbg:#2a0f12;
  --purple:#a78bfa;--pbg:#1e1535;
  --r:14px;--rs:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{scroll-behavior:auto}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.app{max-width:720px;margin:0 auto;padding:0 20px 80px}

/* HEADER */
.hdr{padding:36px 0 28px;border-bottom:1px solid var(--border);margin-bottom:32px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.hdr-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--accent2);background:rgba(79,124,255,.12);border:1px solid rgba(79,124,255,.25);border-radius:20px;padding:4px 12px;margin-bottom:12px}
.hdr h1{font-size:26px;font-weight:600;letter-spacing:-.02em;line-height:1.2;margin-bottom:6px}
.hdr h1 span{color:var(--accent2)}
.hdr p{font-size:13px;color:var(--text2);max-width:440px;line-height:1.65}
.lang-tog{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;flex-shrink:0}
.lbtn{padding:5px 13px;border-radius:7px;border:none;background:transparent;color:var(--text2);font-family:'Sora',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.lbtn.active{background:var(--accent);color:#fff}

/* DOMAIN TRACK */
.dtrack{display:flex;gap:8px;margin-bottom:28px}
.dtrack-item{flex:1;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .2s;opacity:.5}
.dtrack-item.active{opacity:1;border-color:var(--accent);background:rgba(79,124,255,.08)}
.dtrack-item.done{opacity:.75;border-color:var(--green2)}
.dtrack-icon{font-size:20px;margin-bottom:4px}
.dtrack-name{font-size:12px;font-weight:500;color:var(--text2)}
.dtrack-item.active .dtrack-name{color:var(--accent2)}
.dtrack-item.done .dtrack-name{color:var(--green)}

/* SUBTOPIC PROGRESS */
.stprog{display:flex;gap:6px;margin-bottom:24px;align-items:center}
.stpip{width:32px;height:4px;border-radius:2px;background:var(--border2);transition:all .3s;flex-shrink:0}
.stpip.done-good{background:var(--green)}
.stpip.done-ok{background:var(--orange)}
.stpip.done-weak{background:var(--red)}
.stpip.active{background:var(--accent);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.stlabel{font-size:12px;color:var(--text3);margin-left:4px}

/* ATTEMPT DOTS */
.attempt-row{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.adot{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:all .25s}
.adot.used-good{background:var(--green)}
.adot.used-ok{background:var(--orange)}
.adot.used-bad{background:var(--red)}
.adot.current{background:var(--accent);box-shadow:0 0 0 3px rgba(79,124,255,.25)}
.alabel{font-size:12px;color:var(--text3)}

/* CONTEXT CHIP */
.ctx-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;margin-bottom:14px}
.ctx-first{background:rgba(79,124,255,.1);border:1px solid rgba(79,124,255,.2);color:var(--accent2)}
.ctx-retry{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:var(--orange)}
.ctx-final{background:rgba(240,71,87,.1);border:1px solid rgba(240,71,87,.2);color:var(--red)}
.ctx-harder{background:rgba(52,201,122,.1);border:1px solid rgba(52,201,122,.2);color:var(--green)}

/* SCENARIO CARD */
.sc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.sc-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start}
.sc-subtag{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;color:var(--accent2);background:rgba(79,124,255,.1);border-radius:5px;padding:2px 7px;flex-shrink:0;margin-top:3px}
.sc-title{font-size:14px;font-weight:500;line-height:1.5}
.sc-ctx{padding:12px 20px;font-size:13px;color:var(--text2);line-height:1.6;border-bottom:1px solid var(--border);font-style:italic}

/* OPTIONS */
.opts-wrap{padding:14px 20px 18px;display:flex;flex-direction:column;gap:7px}
.opt{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;transition:all .18s;background:var(--surface2)}
.opt:hover{border-color:var(--border2);background:#242a3a}
.opt.sel-good{border-color:var(--green);background:var(--gbg);pointer-events:none}
.opt.sel-ok{border-color:var(--orange);background:var(--obg);pointer-events:none}
.opt.sel-bad{border-color:var(--red);background:var(--rbg);pointer-events:none}
.opt.best-show{border-color:var(--green);background:var(--gbg);opacity:.6;pointer-events:none}
.opt.locked{pointer-events:none}
.opt-letter{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text3);flex-shrink:0;margin-top:1px;font-family:'JetBrains Mono',monospace;transition:all .18s}
.opt.sel-good .opt-letter{background:var(--green);border-color:var(--green);color:#fff}
.opt.sel-ok .opt-letter{background:var(--orange);border-color:var(--orange);color:#000}
.opt.sel-bad .opt-letter{background:var(--red);border-color:var(--red);color:#fff}
.opt.best-show .opt-letter{background:rgba(52,201,122,.25);border-color:var(--green);color:var(--green)}
.opt-text{font-size:13px;line-height:1.45;color:var(--text2);flex:1}
.opt.sel-good .opt-text,.opt.sel-ok .opt-text,.opt.sel-bad .opt-text{color:var(--text)}

/* FEEDBACK */
.fb{margin:0 20px 18px;border-radius:var(--rs);padding:12px 15px;font-size:13px;line-height:1.6;display:none;animation:slideIn .25s ease}
.fb.show{display:block}
.fb-good{background:var(--gbg);border:1px solid var(--green2);color:#7de8a8}
.fb-ok{background:var(--obg);border:1px solid #7a4e00;color:#fbd07c}
.fb-bad{background:var(--rbg);border:1px solid #7a1e28;color:#f9a3ab}
.fb strong{font-weight:600;display:block;margin-bottom:3px}
.fb p{color:inherit;opacity:.9;font-size:12.5px}
.tip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;background:rgba(79,124,255,.12);border:1px solid rgba(79,124,255,.25);border-radius:20px;padding:3px 10px;color:var(--accent2);margin-top:8px}

/* CONTINUE BTN */
.cont-btn{display:none;margin:0 20px 20px;width:calc(100% - 40px)}
.cont-btn.show{display:block}

/* SCREENS */
.screen{display:none}
.screen.active{display:block}

/* WELCOME */
.welcome-title{font-size:22px;font-weight:600;margin-bottom:8px;letter-spacing:-.02em}
.welcome-sub{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:22px}
.how-it-works{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:24px}
.how-it-works h3{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--accent2)}
.how-row{display:flex;gap:12px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border)}
.how-row:last-child{border:none;padding-bottom:0}
.how-icon{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text3);flex-shrink:0;margin-top:2px;width:22px;text-align:left}
.how-text{font-size:13px;color:var(--text2);line-height:1.5}
.how-text strong{color:var(--text);font-weight:500}
.dom-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.dom-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.dom-card-icon{font-size:20px;margin-bottom:8px}
.dom-card-name{font-size:13px;font-weight:500;margin-bottom:3px}
.dom-card-meta{font-size:12px;color:var(--text3)}

/* RESULTS */
.result-section{margin-bottom:28px}
.result-section h3{font-size:15px;font-weight:600;margin-bottom:14px;color:var(--text)}
.st-result{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)}
.st-result:last-child{border:none}
.st-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center}
.st-info{flex:1}
.st-name{font-size:13px;font-weight:500;margin-bottom:2px}
.st-attempts{font-size:12px;color:var(--text3)}
.st-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.04em;flex-shrink:0}
.badge-optimal{background:rgba(52,201,122,.15);color:var(--green);border:1px solid var(--green2)}
.badge-good{background:rgba(245,158,11,.15);color:var(--orange);border:1px solid #7a4e00}
.badge-developing{background:rgba(240,71,87,.15);color:var(--red);border:1px solid #7a1e28}

.rec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:14px 16px;margin-bottom:10px}
.rec-card h4{font-size:13px;font-weight:500;margin-bottom:6px;color:var(--text)}
.rec-card p{font-size:12.5px;color:var(--text2);line-height:1.55}

/* SAVE BANNER */
.save-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-top:20px}
.save-banner p{font-size:13px;color:var(--text2)}
.save-banner p strong{color:var(--text)}
.save-actions{display:flex;gap:8px;flex-wrap:wrap}
.results-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-top:16px}
.results-panel h3{font-size:14px;font-weight:600;margin-bottom:12px}
.re{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12.5px;gap:12px;flex-wrap:wrap}
.re:last-child{border:none}
.re-meta{color:var(--text2)}.re-score{font-family:'JetBrains Mono',monospace;font-weight:500}

/* BTNS */
.btn{padding:10px 22px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:'Sora',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .18s}
.btn:hover{background:var(--surface2);color:var(--text)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:#6690ff;border-color:#6690ff;color:#fff}
.btn-sm{padding:7px 16px;font-size:12.5px;border-radius:8px}
.btn-ghost{border-color:transparent;color:var(--text3)}
.btn-ghost:hover{color:var(--text2);background:transparent}
.btn-full{width:100%;text-align:center}

.completion-big{text-align:center;padding:40px 0 24px}
.completion-big .ci{font-size:48px;margin-bottom:14px}
.completion-big h2{font-size:22px;font-weight:600;letter-spacing:-.02em;margin-bottom:8px}
.completion-big p{font-size:14px;color:var(--text2);max-width:360px;margin:0 auto 24px;line-height:1.65}

@media(max-width:520px){
  .hdr{flex-direction:column}
  .hdr h1{font-size:21px}
  .dtrack{flex-direction:column}
  .dtrack-item{display:flex;align-items:center;gap:10px}
  .dtrack-icon{margin-bottom:0}
}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div>
      <div class="hdr-tag">⚡ <span id="hd-tag"></span></div>
      <h1 id="hd-title"></h1>
      <p id="hd-sub"></p>
    </div>
    <div class="lang-tog">
      <button class="lbtn active" onclick="setLang('es')">ES</button>
      <button class="lbtn" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <!-- WELCOME -->
  <div class="screen active" id="scr-welcome">
    <div class="dom-cards" id="w-dom-cards"></div>
    <div class="how-it-works">
      <h3 id="w-how-title"></h3>
      <div id="w-how-rows"></div>
    </div>
    <div style="display:flex;align-items:center;gap:14px;margin-top:4px">
      <button class="btn btn-primary" onclick="startTool()" id="w-start"></button>
      <span id="w-duration" style="font-size:13px;color:var(--text3)"></span>
    </div>
  </div>

  <!-- LEARNING -->
  <div class="screen" id="scr-learn">
    <div class="dtrack" id="dtrack"></div>
    <div class="stprog" id="stprog"></div>
    <div class="attempt-row" id="attempt-row"></div>
    <div id="ctx-chip-wrap"></div>
    <div id="sc-wrap"></div>
    <button class="btn btn-primary btn-full cont-btn" id="cont-btn" onclick="continueFlow()"></button>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="scr-results">
    <div class="completion-big">
      <div class="ci">🎯</div>
      <h2 id="r-title"></h2>
      <p id="r-sub"></p>
      <button class="btn btn-primary" onclick="restart()" id="r-restart"></button>
    </div>
    <div id="r-domains"></div>
    <div id="r-recs"></div>
    <div id="save-wrap"></div>
    <div id="hist-wrap"></div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════
// CONTENT
// ═══════════════════════════════════════════════════════
const TX = {
es:{
  tag:'Aprendizaje Adaptativo',
  title:'Ciberseguridad <span>Personal</span>',
  sub:'Esta herramienta presenta situaciones cotidianas sobre contraseñas y respaldos — los dos temas que una investigación aplicada identificó como los de mayor impacto en la seguridad digital personal. No hay respuestas únicas; el objetivo es reflexionar sobre las decisiones que tomamos en nuestra vida digital.',

  ],

  badgeDesc:{optimal:'You approached this sub-topic with confidence.',good:'You reached the most secure response after one reinforcement situation.',developing:'This sub-topic was identified as an opportunity area.'},

// ═══════════════════════════════════════════════════════
// QUESTION BANK
// Each question: { title, ctx, opts:[{t,s}], fb:[{cls,head,body,tip}] }
// s: 4=correct 3=good 2=regular 1=bad
// Each subtopic has 3 questions: [initial, retry/easier, harder/final]
// ═══════════════════════════════════════════════════════
const QB = {
es:[
  // DOMAIN 0 — Contraseñas
  [
    // SUBTOPIC 0.0 — Creación y reutilización
    [
      { // Q0: initial
        title:'Llevas años usando la misma contraseña en tu correo, banco y redes sociales porque es fácil de recordar.',
        ctx:'Un servicio que usas anuncia que sufrió una filtración. Tu contraseña estaba en la base de datos expuesta.',
        opts:[
          {t:'Cambio solo la contraseña del servicio que fue filtrado.',s:2},
          {t:'Cambio la contraseña en todos los servicios donde la usé y activo verificación adicional.',s:4},
          {t:'Espero a ver si me avisan que mi cuenta fue afectada.',s:1},
          {t:'Cambio en el correo y el banco, pero dejo las redes sociales.',s:3},
        ],
        fb:[
          {cls:'fb-ok',head:'Parcialmente correcto.',body:'Cambiaste el más obvio, pero el atacante ya tiene esa contraseña y la puede probar en todos los servicios donde la usas. Una filtración expone todos los lugares donde reutilizaste la misma clave.',tip:'Regla práctica: si reutilizaste una contraseña, trátala como comprometida en todos los sitios donde esté.'},
          {cls:'fb-good',head:'Exactamente lo correcto.',body:'Una contraseña filtrada está comprometida en todos los servicios que la usan. Cambiar en todos y activar el segundo factor cierra el riesgo completo. El atacante ya tiene esa clave — cuanto antes la reemplaces en todos lados, mejor.',tip:'Un gestor de contraseñas genera claves únicas por servicio y las recuerda por ti — no tendrías este problema.'},
          {cls:'fb-bad',head:'Esperar tiene un costo.',body:'Cada hora que pasa con esa contraseña activa es tiempo que el atacante puede usarla. No esperes confirmación personal — si el servicio anunció filtración, tu contraseña ya está expuesta.',tip:'Ante cualquier aviso de filtración, actúa el mismo día.'},
          {cls:'fb-ok',head:'Buen instinto, pero incompleto.',body:'Las redes sociales pueden usarse para suplantar tu identidad, acceder a contactos o como puerta de entrada a otros servicios. Si usaste la misma contraseña ahí, también están en riesgo.',tip:'No hay cuenta "poco importante" cuando el esfuerzo de cambiar es solo un par de minutos.'},
        ],
      },
      { // Q1: retry (easier/different context)
        title:'Estás creando una cuenta nueva en una tienda en línea.',
        ctx:'La tienda te pide crear contraseña. Ya tienes muchas cuentas y recordar una nueva parece complicado.',
        opts:[
          {t:'Uso la misma contraseña de siempre — es difícil recordar tantas.',s:1},
          {t:'Creo una variación: mi contraseña habitual + el nombre del sitio al final.',s:2},
          {t:'Genero una contraseña aleatoria con un gestor de contraseñas.',s:4},
          {t:'Creo una frase larga y única para este sitio.',s:3},
        ],

        ctx:'La nube sincroniza automáticamente. Parece que todos los archivos deberían estar a salvo.',

          {t:'Sí — si está en la nube, tengo respaldo completo de todo.',s:2},
          {t:'Depende — la nube cubre fallo de hardware pero no ransomware si la sincronización estaba activa.',s:4},
          {t:'No — la nube nunca es segura para archivos importantes.',s:1},
          {t:'Sí, pero solo si pago por el plan de pago, no el gratuito.',s:2},
        ],
        fb:[
          {cls:'fb-ok',head:'Parcialmente correcto.',body:'La nube cubre fallo de disco y pérdida del dispositivo. Pero si sufres un ataque de ransomware, los archivos cifrados se sincronizan a la nube también. Para ese escenario, necesitas una copia que no esté conectada.',tip:'La nube más un disco externo desconectado cubre ambos escenarios.'},
          {cls:'fb-good',head:'Exactamente correcto.',body:'La sincronización activa es bidireccional. Si el ransomware cifra tus archivos locales, esos archivos cifrados se sincronizan a la nube reemplazando las versiones originales. Un disco externo desconectado no tiene ese problema.',tip:'Algunos servicios de nube guardan versiones anteriores por tiempo limitado — revisa si el tuyo lo hace.'},
          {cls:'fb-bad',head:'La nube sí ofrece protección real para muchos escenarios.',body:'Fallo de disco, robo, daño físico — la nube cubre todo eso. El punto débil específico es el ransomware con sincronización activa. No es que la nube sea insegura, es que tiene un límite específico.',tip:'La nube es una capa de protección valiosa — complementada con un disco externo es aún mejor.'},
          {cls:'fb-ok',head:'El plan no es el factor determinante aquí.',body:'El problema de la sincronización activa con ransomware existe independientemente del plan. Lo que hace la diferencia es tener una copia offline, no el nivel de suscripción.',tip:'Enfócate en la estrategia de respaldo (nube + disco externo) más que en el plan específico.'},
        ],
      },
      { // Q2: harder
        title:'Un familiar trabaja desde casa y guarda todos sus archivos laborales en su laptop. Nunca ha configurado respaldo. ¿Cuál sería el consejo más útil y realista para que empiece hoy?',
        ctx:'No es experto en tecnología. Quieres que la solución sea simple y que realmente la aplique.',
        opts:[
          {t:'Que compre un servidor NAS para tener respaldo local profesional.',s:1},
          {t:'Que active la sincronización automática a la nube en sus documentos — es el primer paso más accesible.',s:4},
          {t:'Que copie manualmente sus archivos a USB cada semana.',s:2},
          {t:'Que instale software de respaldo empresarial para automatizarlo todo.',s:2},
        ],
        fb:[
          {cls:'fb-bad',head:'Un NAS es excesivo para un usuario doméstico sin experiencia.',body:'Un NAS requiere configuración técnica, mantenimiento y tiene un costo significativo. Si no sabe configurarlo bien, puede quedar peor protegido que sin nada.',tip:'La mejor solución es la que realmente va a usar. Para un no técnico, la nube automática es ideal.'},
          {cls:'fb-good',head:'Correcto — accesible y que realmente funciona.',body:'Activar sincronización automática es algo que puede hacer en minutos, no requiere mantenimiento constante, y funciona en segundo plano sin que tenga que recordarlo. Es el punto de partida correcto.',tip:'Una vez que la nube esté activa, el segundo paso es agregar un disco externo mensual — pero la nube ya cubre la mayoría de escenarios.'},
          {cls:'fb-ok',head:'Funciona, pero depende de que lo recuerde.',body:'Las copias manuales son mejores que nada. El problema es que "cada semana" suele convertirse en "cuando me acuerdo", y en una falla podría perder semanas de trabajo.',tip:'La automatización es el factor más importante para que el respaldo sea real. Si puede olvidarlo y funciona igual, es mejor.'},
          {cls:'fb-ok',head:'Demasiado complejo para empezar.',body:'Un software empresarial tiene curva de aprendizaje y configuración que puede abrumar a alguien sin experiencia técnica. La probabilidad de que lo configure mal o lo abandone es alta.',tip:'Empieza simple: nube automática. Si después quiere más control, puede agregar herramientas.'},
        ],
      },
    ],
    // SUBTOPIC 1.1 — Verificar respaldos
    [
      { // Q0: initial
        title:'Llevas un año con respaldo en la nube activo. Un colega te pregunta cuándo fue la última vez que verificaste que el respaldo realmente funciona.',
        ctx:'Te das cuenta de que nunca has intentado restaurar un archivo desde el respaldo. Solo has visto que los archivos aparecen listados en la nube.',
        opts:[
          {t:'Ver los archivos listados en la nube es suficiente — si están ahí, están bien.',s:2},
          {t:'Nunca lo he probado — si está configurado, debería funcionar.',s:1},
          {t:'Esta semana descargo un archivo del respaldo y confirmo que puedo abrirlo.',s:4},
          {t:'Lo reviso cuando tenga tiempo libre.',s:2},
        ],
        fb:[
          {cls:'fb-ok',head:'Ver los archivos no es lo mismo que poder restaurarlos.',body:'Un archivo puede aparecer listado pero estar corrupto, incompleto o con un formato incompatible. La única prueba real de un respaldo es descargarlo y abrirlo exitosamente.',tip:'La diferencia entre "está ahí" y "puedo recuperarlo" es exactamente la que importa en una emergencia.'},
          {cls:'fb-bad',head:'Un respaldo no probado no es un respaldo real.',body:'Los servicios de nube pueden tener errores de sincronización, cuotas llenas o archivos corruptos sin que te avisen. Descubrir que no funciona justo cuando lo necesitas es el peor momento posible.',tip:'Una prueba de 5 minutos hoy puede ahorrarte semanas de trabajo en una emergencia.'},
          {cls:'fb-good',head:'Exactamente lo que debes hacer.',body:'Restaurar un archivo real — no solo verlo en la lista — confirma que la sincronización está activa, los archivos no están corruptos y sabes cómo hacerlo cuando de verdad lo necesites.',tip:'Ponlo en el calendario: "Probar respaldo — 5 min" una vez al mes o cada trimestre.'},
          {cls:'fb-ok',head:'"Cuando tenga tiempo" suele significar nunca.',body:'Igual que el respaldo en sí, la verificación necesita ser programada, no dejarse para cuando haya tiempo. El tiempo disponible siempre tiene prioridades que lo desplazan.',tip:'Programa el recordatorio ahora, aunque sea para la próxima semana. La intención sin fecha no se convierte en acción.'},
        ],
      },
      { // Q1: retry
        title:'¿Cuál de estas acciones confirma realmente que tu respaldo está funcionando?',
        ctx:'Tienes varios archivos sincronizados a la nube desde hace meses.',
        opts:[
          {t:'Verificar que la app de sincronización muestra "sincronizado" o "al día".',s:2},
          {t:'Entrar a la nube y ver que los archivos están listados con sus nombres.',s:2},
          {t:'Descargar un archivo específico del respaldo y abrirlo exitosamente.',s:4},
          {t:'Esperar a que el sistema te avise si hay algún error.',s:1},
        ],
        fb:[
          {cls:'fb-ok',head:'El estado "sincronizado" indica que el proceso corrió, no que los archivos son recuperables.',body:'La app puede mostrar que sincronizó correctamente pero los archivos pueden estar corruptos en el servidor. Son dos cosas distintas.',tip:'La única prueba definitiva es poder recuperar el archivo y usarlo.'},
          {cls:'fb-ok',head:'Ver los nombres confirma que existen, no que funcionan.',body:'Un archivo listado puede estar corrupto, tener el tamaño incorrecto o no abrirse. La lista es solo una referencia visual, no una prueba de integridad.',tip:'La prueba real es: descargar + abrir + confirmar que el contenido está intacto.'},
          {cls:'fb-good',head:'Correcto. Esa es la única prueba real.',body:'Descargar un archivo y abrirlo exitosamente confirma que el proceso completo funciona: la carga al servidor fue exitosa, el archivo no está corrupto y la descarga funciona. No hay atajos para esta verificación.',tip:'Elige archivos representativos — un documento, una foto, una hoja de cálculo — para cubrir distintos tipos.'},
          {cls:'fb-bad',head:'Los errores no siempre generan avisos automáticos.',body:'Muchos problemas de integridad de archivos no producen alertas visibles. El archivo puede estar corruptamente sincronizado sin que el sistema lo detecte.',tip:'No dependas de que el sistema te avise — haz la verificación activamente.'},
        ],
      },
      { // Q2: harder
        title:'Tu empresa tiene respaldo automático configurado desde hace 2 años. El equipo de TI asume que todo funciona porque nunca han recibido alertas de error. ¿Qué falta?',
        ctx:'El respaldo corre en segundo plano, sin interrupciones visibles, y el dashboard muestra "activo".',
        opts:[
          {t:'Nada — si no hay alertas de error en 2 años, el respaldo funciona.',s:1},
          {t:'Deberían aumentar la frecuencia de respaldo a más veces por día.',s:2},
          {t:'Deberían hacer una restauración de prueba periódica para verificar que los archivos son recuperables.',s:4},
          {t:'Deberían cambiar de proveedor de respaldo por seguridad.',s:1},
        ],
        fb:[
          {cls:'fb-bad',head:'Ausencia de alertas no confirma que funciona.',body:'Los sistemas de respaldo pueden correr sin errores aparentes pero con archivos corruptos, configuraciones incompletas o problemas de integridad que solo se descubren al intentar restaurar.',tip:'En empresas, se recomienda una restauración de prueba al menos trimestralmente.'},
          {cls:'fb-ok',head:'La frecuencia es un factor, pero no es el problema aquí.',body:'Aumentar la frecuencia mejora qué tan recientes son los datos del respaldo. Pero si los respaldos frecuentes están corruptos, la frecuencia no ayuda. El problema es que nunca se ha verificado que funcionen.',tip:'Primero verifica que lo que tienes funciona; luego optimiza la frecuencia.'},
          {cls:'fb-good',head:'Exactamente lo que falta.',body:'En 2 años sin una restauración de prueba, no saben si los archivos son realmente recuperables. El dashboard activo confirma que el proceso corre, no que produce archivos utilizables. Una prueba de restauración es la única validación real.',tip:'La prueba debe incluir restaurar a un entorno diferente, no al mismo lugar de origen, para simular una emergencia real.'},
          {cls:'fb-bad',head:'Cambiar de proveedor no resuelve el problema real.',body:'El problema es la falta de verificación, no el proveedor. Con cualquier proveedor, sin restauraciones de prueba periódicas, no saben si el respaldo funciona.',tip:'Establece un protocolo de prueba antes de considerar cambios de proveedor.'},
        ],
      },
    ],
    // SUBTOPIC 1.2 — Respuesta ante ransomware
    [
      { // Q0: initial
        title:'Un lunes por la mañana abres tu laptop y todos los archivos tienen una extensión extraña. Un mensaje dice: "Tus archivos fueron cifrados. Paga para recuperarlos."',
        ctx:'La laptop sigue conectada a la red WiFi de casa, donde también hay otros dispositivos: el teléfono, la tablet de tu hijo y la laptop de trabajo.',
        opts:[
          {t:'Busco en internet cómo descifrar los archivos desde esta misma laptop.',s:1},
          {t:'Desconecto la laptop de la red inmediatamente y luego evalúo opciones.',s:4},
          {t:'Pago el rescate — quiero recuperar los archivos lo más rápido posible.',s:1},
          {t:'Apago la laptop y la llevo a un técnico.',s:2},
        ],
        fb:[
          {cls:'fb-bad',head:'Buscar soluciones con el equipo conectado permite que el daño continúe.',body:'Mientras la laptop está en la red, el ransomware puede propagarse a los otros dispositivos. Además, algunas "soluciones" en línea son más malware disfrazado de herramientas de recuperación.',tip:'Primer paso siempre: desconectar de la red. Luego investiga desde otro dispositivo limpio.'},
          {cls:'fb-good',head:'Correcto. Ese es el primer paso.',body:'Desconectar de la red contiene el daño: el ransomware no puede propagarse a otros dispositivos, no puede comunicarse con el servidor del atacante y no puede cifrar más archivos en red compartida. Ganas tiempo para evaluar con calma.',tip:'Después: no pagues, reporta a soporte técnico, y verifica si tienes un respaldo externo desconectado.'},
          {cls:'fb-bad',head:'Pagar no garantiza recuperación.',body:'Pagar financia a los atacantes para seguir operando, no garantiza que envíen la clave de descifrado, y te marca como objetivo dispuesto a pagar. Mientras deliberas si pagar, la laptop sigue en la red y el ransomware sigue activo.',tip:'Primer paso: desconectar. Pagar es siempre el último recurso y raramente funciona.'},
          {cls:'fb-ok',head:'Mejor que no hacer nada, pero hay un paso más urgente antes.',body:'Apagar puede detener el cifrado activo, pero si la laptop sigue en la red antes de apagarla, el ransomware ya pudo propagarse a otros dispositivos. Desconectar de la red primero, luego apagar.',tip:'El orden correcto: 1) Desconectar de red, 2) Evaluar si apagar, 3) Contactar soporte.'},
        ],
      },
      { // Q1: retry
        title:'¿Por qué no deberías apagar inmediatamente un equipo infectado con ransomware?',
        ctx:'El instinto es apagar para "detener" el ataque. Pero hay un motivo técnico para pensarlo dos veces.',
        opts:[
          {t:'Porque el ransomware se activa más rápido al reiniciar.',s:2},
          {t:'Porque apagar puede destruir evidencia forense en memoria RAM que ayuda a identificar el tipo de ransomware.',s:4},
          {t:'No hay razón — apagar siempre es lo primero que se debe hacer.',s:1},
          {t:'Porque el disco duro se daña si se apaga durante el cifrado.',s:2},
        ],
        fb:[
          {cls:'fb-ok',head:'No es la razón principal.',body:'El ransomware no se "activa más rápido" al reiniciar — la mayoría está diseñado para continuar en el arranque. Pero no es el motivo técnico más importante para no apagar de inmediato.',tip:'La razón real tiene que ver con la evidencia que existe en la memoria activa del sistema.'},
          {cls:'fb-good',head:'Correcto.',body:'La memoria RAM contiene información sobre el proceso activo del ransomware, posibles claves de descifrado temporales y detalles que ayudan a identificar la variante. Un análisis forense mientras el equipo está encendido puede recuperar datos valiosos. Apagar destruye esa información.',tip:'En un contexto empresarial, un especialista en forense puede analizar la RAM antes de apagar. En casa, la prioridad es desconectar de la red y contactar soporte.'},
          {cls:'fb-bad',head:'Apagar puede tener consecuencias técnicas.',body:'Aunque detiene el cifrado activo, apagar elimina información en RAM que podría ayudar a recuperar archivos o identificar el ransomware. En entornos empresariales, los especialistas forenses prefieren trabajar con el equipo encendido.',tip:'La prioridad inmediata es desconectar de la red, no necesariamente apagar.'},
          {cls:'fb-ok',head:'No es el riesgo principal aquí.',body:'Los discos modernos manejan el apagado durante escritura sin daño físico permanente. La razón para no apagar inmediatamente es preservar evidencia forense en RAM, no proteger el hardware.',tip:'El hardware está bien — lo que se pierde al apagar es información sobre el ataque que podría ayudar a la recuperación.'},
        ],
      },
      { // Q2: harder
        title:'Tienes un respaldo en disco externo que actualizaste hace 3 días. Sufres un ataque de ransomware. ¿Cuál es la secuencia correcta de acciones?',
        ctx:'El disco externo no estaba conectado en el momento del ataque. Tienes acceso a otro equipo limpio.',
        opts:[
          {t:'1) Pagar el rescate 2) Restaurar desde respaldo si no funciona.',s:1},
          {t:'1) Intentar descifrar desde el mismo equipo infectado 2) Restaurar si no funciono.',s:1},
          {t:'1) Desconectar de la red 2) Reportar 3) Restaurar desde el respaldo externo en un equipo limpio.',s:4},
          {t:'1) Conectar el disco externo al equipo infectado 2) Copiar los archivos cifrados al disco.',s:1},
        ],
        fb:[
          {cls:'fb-bad',head:'Pagar primero es la peor opción.',body:'Pagar no garantiza recuperación y financia al atacante. Si tienes un respaldo funcional, no hay ninguna razón para pagar. El rescate es siempre el último recurso, no el primero.',tip:'Con un respaldo verificado de hace 3 días, la pérdida máxima son esos 3 días — recuperable.'},
          {cls:'fb-bad',head:'Usar el equipo infectado para descifrar es riesgoso.',body:'El equipo infectado puede tener más malware además del ransomware visible. Usarlo activamente puede empeorar la situación o contaminar más archivos.',tip:'Trabaja siempre desde un equipo limpio cuando hagas recuperación de un sistema infectado.'},
          {cls:'fb-good',head:'La secuencia correcta.',body:'Desconectar de la red contiene el daño. Reportar a TI o soporte documenta el incidente y obtiene orientación experta. Restaurar desde el disco externo (que no estaba conectado, por lo tanto no fue cifrado) en un equipo limpio es la recuperación más segura.',tip:'Verifica que el equipo de restauración esté completamente limpio antes de conectar el disco externo.'},
          {cls:'fb-bad',head:'Conectar el disco externo al equipo infectado es riesgoso.',body:'El equipo infectado puede contaminar el disco externo — el ransomware o malware adicional puede propagarse al conectar cualquier dispositivo de almacenamiento.',tip:'Nunca conectes tu respaldo a un equipo infectado. Usa siempre un equipo limpio para la restauración.'},
        ],
      },
    ],
    // SUBTOPIC 1.3 — Compartir documentos
    [
      { // Q0: initial
        title:'Un compañero de trabajo te pide un documento de proyecto. Generas un enlace público porque es más rápido que pedirle su correo.',
        ctx:'El documento tiene información interna del proyecto: cronogramas, presupuestos estimados, nombres de clientes.',
        opts:[
          {t:'El enlace público está bien — solo mi compañero tiene el link.',s:1},
          {t:'Mejor compartir directamente con la cuenta de correo de mi compañero.',s:4},
          {t:'Genero el enlace con expiración de 48 horas.',s:3},
          {t:'Le mando el archivo como adjunto por correo.',s:3},
        ],
        fb:[
          {cls:'fb-bad',head:'"Solo mi compañero tiene el link" es un supuesto frágil.',body:'Un link puede ser reenviado accidentalmente, aparecer en historial de correo, indexarse en buscadores internos o quedar expuesto si el dispositivo de tu compañero es comprometido. Información de clientes y presupuestos merece más control.',tip:'La pregunta correcta: ¿quién debería poder ver esto? Si la respuesta es "solo mi compañero", comparte solo con él.'},
          {cls:'fb-good',head:'La opción con más control.',body:'Compartir con una cuenta específica significa que solo esa persona puede acceder, tienes un registro de quién tiene acceso y puedes revocar cuando sea necesario. Toma los mismos segundos que generar un link público.',tip:'En la mayoría de plataformas: clic en "compartir" → escribes el correo → listo. No más lento que un link.'},
          {cls:'fb-ok',head:'Mejor que un link permanente.',body:'La expiración limita el tiempo de exposición. Pero durante esas 48 horas, cualquiera con el link puede acceder sin restricción. Para documentos con datos de clientes, el control de quién accede es más importante que el tiempo.',tip:'Combina expiración con acceso por cuenta específica cuando el contenido sea sensible.'},
          {cls:'fb-ok',head:'Controlado, con una limitación.',body:'El adjunto por correo solo llega a quien tú lo envías. El lado negativo: queda en el historial de correo de ambos indefinidamente y si el documento se actualiza, tu compañero tiene una versión desactualizada.',tip:'Para documentos que se actualizan, compartir en la nube con permisos específicos es más manejable.'},
        ],
      },
      { // Q1: retry
        title:'¿Cuál es el riesgo principal de compartir documentos con enlaces que no requieren iniciar sesión?',
        ctx:'Los enlaces sin login son convenientes y ampliamente usados.',
        opts:[
          {t:'Los archivos se descargan más lento.',s:1},
          {t:'El link puede llegar a personas no autorizadas sin que lo sepas.',s:4},
          {t:'La nube cobra más por ese tipo de links.',s:1},
          {t:'Los archivos no se pueden editar con ese tipo de link.',s:2},
        ],
        fb:[
          {cls:'fb-bad',head:'La velocidad no tiene relación con el tipo de enlace.',body:'El riesgo de los links públicos no es técnico de rendimiento — es de control de acceso.',tip:'El problema es quién puede verlo, no qué tan rápido se descarga.'},
          {cls:'fb-good',head:'Correcto. El control de acceso es el riesgo central.',body:'Un link sin autenticación puede ser reenviado a cualquiera, copiado de un historial de correo, encontrado en una búsqueda o quedar expuesto si cualquier dispositivo que lo recibió es comprometido. No tienes visibilidad ni control de quién termina teniendo ese link.',tip:'La alternativa: compartir con cuentas específicas te da la lista exacta de quién puede acceder.'},
          {cls:'fb-bad',head:'El costo no depende del tipo de enlace de esa manera.',body:'Los modelos de precios de la nube no funcionan así. El riesgo es de acceso no autorizado, no financiero.',tip:'Enfócate en quién puede ver el archivo — ese es el riesgo real.'},
          {cls:'fb-ok',head:'Los permisos de edición son separables del tipo de link.',body:'Puedes generar un link público solo de lectura o de edición — son configuraciones independientes. El riesgo principal no es la edición sino quién puede acceder al link.',tip:'El control de acceso (quién puede ver) es más importante que el control de edición (qué puede hacer).'},
        ],
      },
      { // Q2: harder
        title:'Tu empresa tiene una política de compartir documentos internos solo con cuentas corporativas, sin links públicos. Un cliente externo necesita un archivo urgente y no tiene cuenta corporativa.',
        ctx:'El archivo tiene información contractual. El cliente lo necesita en los próximos 30 minutos.',
        opts:[
          {t:'Genero un link público porque la urgencia justifica saltarse la política.',s:1},
          {t:'Le mando el archivo como adjunto por correo al cliente.',s:3},
          {t:'Genero un link con expiración de 2 horas y contraseña, y se la doy al cliente por separado.',s:4},
          {t:'Le digo al cliente que espere hasta que TI pueda crear un acceso formal.',s:2},
        ],
        fb:[
          {cls:'fb-bad',head:'La urgencia no justifica eliminar controles de seguridad.',body:'Las políticas existen precisamente para situaciones bajo presión — cuando la urgencia hace que sea tentador saltarlas. Un link público con información contractual puede llegar a terceros no autorizados.',tip:'La urgencia debe activar creatividad dentro de los controles, no la eliminación de los controles.'},
          {cls:'fb-ok',head:'Razonable para urgencias, con limitaciones.',body:'El adjunto por correo llega directamente al cliente sin link público. El lado negativo: queda en el historial de correo sin fecha de expiración y si se reenvía, no tienes control.',tip:'Si el adjunto funciona para este caso, considera agregar contraseña al archivo para una capa extra.'},
          {cls:'fb-good',head:'La solución que equilibra urgencia y control.',body:'Un link con expiración corta limita el tiempo de exposición. La contraseña enviada por separado (por otro canal, como llamada o SMS) asegura que solo quien tú contactaste puede abrirlo. Cumple la urgencia sin eliminar los controles.',tip:'Separar el link y la contraseña en canales distintos es una práctica de seguridad estándar para este tipo de situaciones.'},
          {cls:'fb-ok',head:'Correcto en principio, pero puede no ser viable.',body:'Esperar a TI es la respuesta más segura si el tiempo lo permite. En una situación de 30 minutos, puede no ser posible. Hay opciones intermedias (link con expiración + contraseña) que mantienen control sin depender de TI.',tip:'Vale la pena conocer estas opciones intermedias antes de que llegue la urgencia, no durante.'},
        ],
      },
    ],
  ],
],
en:[
  // DOMAIN 0 — Passwords
  [
    // SUBTOPIC 0.0 — Creation & reuse
    [
      {
        title:'You\'ve used the same password for your email, bank, and social networks for years because it\'s easy to remember.',
        ctx:'A service you use announces it suffered a data breach. Your password was in the exposed database.',
        opts:[
          {t:'I change the password only on the service that was breached.',s:2},
          {t:'I change the password on every service where I used it and enable additional verification.',s:4},
          {t:'I wait to see if they tell me my account was affected.',s:1},
          {t:'I change it for email and bank but leave social networks.',s:3},
        ],
        fb:[
          {cls:'fb-ok',head:'Partially correct.',body:'You protected the most obvious one, but the attacker already has that password and can try it on every service where you reused it. One breach exposes everywhere you used the same key.',tip:'Practical rule: if you reused a password, treat it as compromised on every site that has it.'},
          {cls:'fb-good',head:'Exactly right.',body:'A leaked password is compromised on every service using it. Changing everywhere and enabling a second factor closes the full risk. The attacker already has that key — the sooner you replace it everywhere, the better.',tip:'A password manager generates unique keys per service and remembers them for you — you wouldn\'t have this problem.'},
          {cls:'fb-bad',head:'Waiting has a cost.',body:'Every hour that passes with that password active is time the attacker can use it. Don\'t wait for personal confirmation — if the service announced a breach, your password is already exposed.',tip:'On any breach notification, act the same day.'},
          {cls:'fb-ok',head:'Good instinct, but incomplete.',body:'Social accounts can be used to impersonate you, access contacts or as a gateway to other services. If you used the same password there, they\'re at risk too.',tip:'No account is "unimportant" when changing it takes just a couple of minutes.'},
        ],
      },
      {
        title:'You\'re creating a new account on an online store.',
        ctx:'The store asks you to create a password. You already have many accounts and remembering another one feels hard.',
        opts:[
          {t:'I use my usual password — it\'s hard to remember so many different ones.',s:1},

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let lang = 'es';
let domainIdx = 0;     // 0 or 1
let subtopicIdx = 0;   // 0-3
let attemptIdx = 0;    // 0-2 (max 3 attempts per subtopic)
let subtopicResults2 = [[null,null,null,null],[null,null,null,null]];

const STORAGE_KEY = 'cyberad_results';

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function currentQ() {
  return QB[lang][domainIdx][subtopicIdx][Math.min(attemptIdx, 2)];
}

function totalSubtopics() { return 4; }

function getBadge(attempts, lastCorrect) {
  if (!lastCorrect) return 'developing';
  if (attempts === 1) return 'optimal';
  return 'good';
}

// ═══════════════════════════════════════════════════════
// LANG
// ═══════════════════════════════════════════════════════
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lbtn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  document.documentElement.lang = l;
  renderHeader();
  const active = document.querySelector('.screen.active').id;
  if (active === 'scr-welcome') renderWelcome();
}

// ═══════════════════════════════════════════════════════
// RENDER HEADER
// ═══════════════════════════════════════════════════════
function renderHeader() {
  const tx = TX[lang];
  document.getElementById('hd-tag').textContent = tx.tag;
  document.getElementById('hd-title').innerHTML = tx.title;
  document.getElementById('hd-sub').textContent = tx.sub;
}

// ═══════════════════════════════════════════════════════
// WELCOME
// ═══════════════════════════════════════════════════════
function renderWelcome() {
  const tx = TX[lang];
  document.getElementById('hd-sub').textContent = tx.sub;
  document.getElementById('w-how-title').textContent = tx.howTitle;
  document.getElementById('w-start').textContent = tx.wStart;
  document.getElementById('w-duration').textContent = tx.duration || (lang === 'es' ? 'Duración estimada: 10–20 min' : 'Estimated duration: 10–20 min');
  const cards = document.getElementById('w-dom-cards');
  cards.innerHTML = '';
  tx.domains.forEach((name, di) => {
    cards.innerHTML += `<div class="dom-card"><div class="dom-card-icon">${tx.domainIcons[di]}</div><div class="dom-card-name">${name}</div><div class="dom-card-meta">${tx.domainMeta ? tx.domainMeta[di] : (lang==='es'?'4 sub-temas · hasta 12 situaciones':'4 sub-topics · up to 12 situations')}</div></div>`;
  });
  const rows = document.getElementById('w-how-rows');
  rows.innerHTML = '';
  tx.howRows.forEach(r => {
    rows.innerHTML += `<div class="how-row"><div class="how-icon">${r.icon}</div><div class="how-text">${r.text}</div></div>`;
  });
}

// ═══════════════════════════════════════════════════════
// DOMAIN TRACK
// ═══════════════════════════════════════════════════════
function renderDomainTrack() {
  const tx = TX[lang];
  const el = document.getElementById('dtrack');
  el.innerHTML = '';
  tx.domains.forEach((name, di) => {
    const done = di < domainIdx || (di === domainIdx && subtopicIdx >= 4);
    const active = di === domainIdx && subtopicIdx < 4;
    const div = document.createElement('div');
    div.className = 'dtrack-item' + (active ? ' active' : done ? ' done' : '');
    div.innerHTML = `<div class="dtrack-icon">${tx.domainIcons[di]}</div><div class="dtrack-name">${name}</div>`;
    el.appendChild(div);
  });
}

// ═══════════════════════════════════════════════════════
// SUBTOPIC PROGRESS
// ═══════════════════════════════════════════════════════
function renderSubtopicProgress() {
  const el = document.getElementById('stprog');
  el.innerHTML = '';
  for (let si = 0; si < 4; si++) {
    const res = subtopicResults2[domainIdx][si];
    const pip = document.createElement('div');
    pip.className = 'stpip';
    if (res) {
      pip.classList.add(res.badge === 'optimal' ? 'done-good' : res.badge === 'good' ? 'done-ok' : 'done-weak');
    } else if (si === subtopicIdx) {
      pip.classList.add('active');
    }
    el.appendChild(pip);
  }
  const label = document.createElement('span');
  label.className = 'stlabel';
  label.textContent = TX[lang].subtopics[domainIdx][subtopicIdx];
  el.appendChild(label);
}

// ═══════════════════════════════════════════════════════
// ATTEMPT DOTS
// ═══════════════════════════════════════════════════════
function renderAttemptDots() {
  const el = document.getElementById('attempt-row');
  el.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('div');
    dot.className = 'adot';
    if (i < attemptIdx) dot.classList.add('used-bad');
    else if (i === attemptIdx) dot.classList.add('current');
    el.appendChild(dot);
  }
  const lbl = document.createElement('span');
  lbl.className = 'alabel';
  lbl.textContent = TX[lang].attemptLabel + ' ' + (attemptIdx + 1) + ' / 3';
  el.appendChild(lbl);
}

// ═══════════════════════════════════════════════════════
// CONTEXT CHIP
// ═══════════════════════════════════════════════════════
function renderCtxChip() {
  const tx = TX[lang];
  const el = document.getElementById('ctx-chip-wrap');
  el.innerHTML = '';
  let cls, label;
  if (attemptIdx === 0) { cls = 'ctx-first'; label = tx.ctxLabels.first; }
  else if (attemptIdx === 1) { cls = 'ctx-retry'; label = tx.ctxLabels.retry.replace('{n}', '2'); }
  else { cls = 'ctx-final'; label = tx.ctxLabels.final; }
  el.innerHTML = `<div class="ctx-chip ${cls}">${label}</div>`;
}

// ═══════════════════════════════════════════════════════
// RENDER SCENARIO
// ═══════════════════════════════════════════════════════
function renderScenario() {
  renderDomainTrack();
  renderSubtopicProgress();
  renderAttemptDots();
  renderCtxChip();

  const q = currentQ();
  const letters = ['A','B','C','D'];
  const wrap = document.getElementById('sc-wrap');
  wrap.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'sc-card';
  card.innerHTML = `
    <div class="sc-head">
      <div class="sc-subtag">${TX[lang].subtopics[domainIdx][subtopicIdx]}</div>
      <div class="sc-title">${q.title}</div>
    </div>
    <div class="sc-ctx">${q.ctx}</div>
    <div class="opts-wrap" id="opts-wrap"></div>
    <div class="fb" id="fb-el"></div>`;
  wrap.appendChild(card);

  const optsWrap = document.getElementById('opts-wrap');
  q.opts.forEach((opt, oi) => {
    const div = document.createElement('div');
    div.className = 'opt';
    div.innerHTML = `<div class="opt-letter">${letters[oi]}</div><div class="opt-text">${opt.t}</div>`;
    div.onclick = () => pickAnswer(oi);
    optsWrap.appendChild(div);
  });

  document.getElementById('cont-btn').className = 'btn btn-primary btn-full cont-btn';
  document.getElementById('cont-btn').textContent = TX[lang].contBtn;
}

// ═══════════════════════════════════════════════════════
// PICK ANSWER
// ═══════════════════════════════════════════════════════
function pickAnswer(oi) {
  const q = currentQ();
  const opts = document.querySelectorAll('#opts-wrap .opt');
  const fb = document.getElementById('fb-el');
  const score = q.opts[oi].s;
  const fbData = q.fb[oi];
  const correct = score === 4;

  opts.forEach(o => o.classList.add('locked'));
  const cls = score === 4 ? 'sel-good' : score === 3 ? 'sel-ok' : 'sel-bad';
  opts[oi].classList.add(cls);

  if (!correct) {
    q.opts.forEach((opt, i) => { if (opt.s === 4) opts[i].classList.add('best-show'); });
  }

  fb.className = 'fb show ' + fbData.cls;
  fb.innerHTML = `<strong>${fbData.head}</strong><p>${fbData.body}</p>${fbData.tip ? '<div class="tip">💡 ' + fbData.tip + '</div>' : ''}`;

  // update attempt dot
  const dots = document.querySelectorAll('.adot');
  if (dots[attemptIdx]) {
    dots[attemptIdx].classList.remove('current');
    dots[attemptIdx].classList.add(correct ? 'used-good' : 'used-bad');
  }

  document.getElementById('cont-btn').classList.add('show');

  // store result locally
  if (!window._currentResult) window._currentResult = { attempts: 0, correct: false };
  window._currentResult.attempts = attemptIdx + 1;
  window._currentResult.correct = correct;
  window._lastCorrect = correct;
}

// ═══════════════════════════════════════════════════════
// CONTINUE FLOW
// ═══════════════════════════════════════════════════════
function continueFlow() {
  const correct = window._lastCorrect;
  const isLastAttempt = attemptIdx >= 2;

  if (correct || isLastAttempt) {
    // save subtopic result
    const badge = getBadge(window._currentResult.attempts, correct);
    subtopicResults2[domainIdx][subtopicIdx] = {
      badge,
      attempts: window._currentResult.attempts,
      correct,
    };
    window._currentResult = null;
    window._lastCorrect = false;
    attemptIdx = 0;
    subtopicIdx++;

    if (subtopicIdx >= 4) {
      // domain done
      subtopicIdx = 0;
      domainIdx++;
      if (domainIdx >= 2) {
        showResults();
        return;
      }
    }
  } else {
    attemptIdx++;
  }

  window.scrollTo(0, 0);
  document.documentElement.scrollTop = 0;
  renderScenario();
}

  let hasWeak = false;

  tx.domains.forEach((dname, di) => {
    tx.subtopics[di].forEach((stname, si) => {
      const res = subtopicResults2[di][si];
      if (res && res.badge === 'developing') {
        hasWeak = true;
        const globalIdx = di * 4 + si;
        const tips = recsByIndex[lang][globalIdx] || [];
        const card = document.createElement('div');
        card.className = 'rec-card';
        card.innerHTML = `<h4>⚠️ ${stname}</h4>${tips.map(t => '<p>→ ' + t + '</p>').join('')}`;
        recWrap.appendChild(card);
      }
    });
  });

  if (hasWeak) {
    const h = document.createElement('h3');
    h.style.cssText = 'font-size:15px;font-weight:600;margin:24px 0 6px';
    h.textContent = tx.rRecTitle;
    recWrap.insertBefore(h, recWrap.firstChild);
    const sub = document.createElement('p');
    sub.style.cssText = 'font-size:13px;color:var(--text2);margin-bottom:14px';
    sub.textContent = tx.rRecSub;
    recWrap.insertBefore(sub, recWrap.children[1]);
  }

  renderSaveBanner();
  renderHistory();
}

// ═══════════════════════════════════════════════════════
// SAVE / DOWNLOAD
// ═══════════════════════════════════════════════════════
function getSaved() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}

function saveResults() {
  const tx = TX[lang];
  const entry = {
    date: new Date().toLocaleString(),
    lang: lang.toUpperCase(),
    domains: TX[lang].domains.map((dname, di) => ({
      domain: dname,
      subtopics: TX[lang].subtopics[di].map((stname, si) => {
        const r = subtopicResults2[di][si];
        return { subtopic: stname, badge: r ? r.badge : 'n/a', attempts: r ? r.attempts : 0 };
      }),
    })),
  };
  const saved = getSaved();
  saved.unshift(entry);
  if (saved.length > 30) saved.pop();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  renderSaveBanner(true);
  renderHistory();
}

function downloadJSON() {
  const saved = getSaved();
  if (!saved.length) return;
  const blob = new Blob([JSON.stringify(saved, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ciberseguridad_adaptativa_' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function clearHistory() {
  localStorage.removeItem(STORAGE_KEY);
  renderSaveBanner(false);
  renderHistory();
}

function renderSaveBanner(saved = false) {
  const tx = TX[lang];
  const existing = document.getElementById('save-banner');
  if (existing) existing.remove();
  const hasSaved = getSaved().length > 0;
  const banner = document.createElement('div');
  banner.id = 'save-banner';
  banner.className = 'save-banner';
  banner.innerHTML = `<p><strong>${saved ? tx.savedOk : tx.saveLabel}</strong> — ${tx.saveDesc}</p>
    <div class="save-actions">
      ${!saved ? `<button class="btn btn-sm btn-primary" onclick="saveResults()">${tx.saveLabel}</button>` : ''}
      ${hasSaved ? `<button class="btn btn-sm" onclick="downloadJSON()">${tx.downloadLabel}</button>` : ''}
      ${hasSaved ? `<button class="btn btn-sm btn-ghost" onclick="clearHistory()">${tx.clearLabel}</button>` : ''}
    </div>`;
  document.getElementById('save-wrap').appendChild(banner);
}

function renderHistory() {
  const tx = TX[lang];
  const wrap = document.getElementById('hist-wrap');
  wrap.innerHTML = '';
  const saved = getSaved();
  if (!saved.length) return;
  const panel = document.createElement('div');
  panel.className = 'results-panel';
  panel.innerHTML = `<h3>${tx.histTitle}</h3>`;
  saved.forEach(e => {
    const row = document.createElement('div');
    row.className = 're';
    const summary = e.domains ? e.domains.map(d =>
      d.subtopics.filter(s => s.badge === 'developing').length + ' ⚠'
    ).join(' / ') : '';
    row.innerHTML = `<span class="re-meta">${e.date} · ${e.lang}</span><span class="re-score">${summary}</span>`;
    panel.appendChild(row);
  });
  wrap.appendChild(panel);
}

// ═══════════════════════════════════════════════════════
// SCREENS
// ═══════════════════════════════════════════════════════
function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
  document.documentElement.scrollTop = 0;
}

function startTool() {
  domainIdx = 0; subtopicIdx = 0; attemptIdx = 0;
  subtopicResults2 = [[null,null,null,null],[null,null,null,null]];
  window._currentResult = null;
  window._lastCorrect = false;
  switchScreen('scr-learn');
  renderScenario();
}

function restart() {
  startTool();
  switchScreen('scr-learn');
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
renderHeader();
renderWelcome();
</script>
